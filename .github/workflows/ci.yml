name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Rust workspace ─────────────────────────────────────────────────────────
  #
  # All five crates (acc-model, acc-client, acc-cli, acc-server, acc-agent)
  # share the root Cargo.toml workspace, so a single `--workspace` invocation
  # covers the entire Rust surface of the repo.
  rust-workspace:
    name: Rust workspace (check + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache is keyed to the workspace root Cargo.lock.
          workspaces: "."

      - name: cargo check (all targets, all workspace members)
        run: cargo check --workspace --all-targets

      - name: cargo test (all workspace members)
        run: cargo test --workspace

  # ── Python acc-client package ─────────────────────────────────────────────
  #
  # Installs the package from clients/python/acc_client in editable mode
  # (including the [test] extras) and runs pytest.  respx is used for HTTP
  # mocking so no live server is required.
  python-acc-client:
    name: Python acc-client (pytest)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install acc-client and test dependencies
        run: pip install -e "clients/python/acc_client[test]"

      - name: Run pytest
        run: |
          cd clients/python/acc_client
          python -m pytest -q --tb=short

  # ── Python syntax check ───────────────────────────────────────────────────
  #
  # Quick compile-only pass over every .py file in the repo.  This catches
  # SyntaxErrors in hermes and deploy scripts that are not covered by pytest.
  python-lint:
    name: Python scripts (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check all Python files
        run: |
          find . -name '*.py' \
            -not -path './.git/*' \
            -not -path './target/*' \
            -not -path './**/target/*' \
            | xargs python3 -m py_compile && echo "All Python files syntax OK"

  shell-check:
    name: Shell scripts (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck deploy scripts
        run: |
          find deploy/ -name '*.sh' | xargs shellcheck --severity=error || true
          find scripts/ -name '*.sh' 2>/dev/null | xargs shellcheck --severity=error || true

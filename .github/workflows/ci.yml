name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-server:
    name: acc-server (check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acc-server

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: acc-server

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

  rust-agent:
    name: acc-agent (check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

  python-lint:
    name: Python scripts (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check all Python files
        run: |
          mapfile -d '' files < <(
            find . -name '*.py' \
              -not -path './.git/*' \
              -not -path './agent/*/target/*' \
              -not -path './acc-server/target/*' \
              -print0
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files found"
          else
            python3 -m py_compile "${files[@]}"
            echo "All Python files syntax OK"
          fi

  shell-check:
    name: Shell scripts (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck deploy scripts
        run: |
          find deploy/ -name '*.sh' | xargs shellcheck --severity=error || true
          find scripts/ -name '*.sh' 2>/dev/null | xargs shellcheck --severity=error || true

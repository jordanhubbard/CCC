# RCC — Rocky Command Center
# docker compose up    → starts the full stack
# docker compose up -d → detached
#
# First run: make init-rcc (generates .env and config in ./rcc-data/)
#
# See GETTING_STARTED.md for the full operator walkthrough.

services:

  # ── RCC API ──────────────────────────────────────────────────────────────
  rcc-api:
    image: ghcr.io/jordanhubbard/rcc:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rcc-api
    restart: unless-stopped
    env_file:
      - ./rcc-data/.env          # generated by make init-rcc
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data/rcc
      - QUEUE_PATH=/data/rcc/queue.json
      - EXEC_LOG_PATH=/data/rcc/exec-log.jsonl
    ports:
      - "${RCC_PORT:-8789}:8789"
    volumes:
      - ./rcc-data:/data/rcc     # persistent queue + agent registry + secrets
      - ./logs:/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rcc-net

  # ── SquirrelChat ──────────────────────────────────────────────────────────
  squirrelchat:
    image: ghcr.io/jordanhubbard/rcc:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: squirrelchat
    restart: unless-stopped
    command: ["node", "squirrelchat/server.mjs"]
    env_file:
      - ./rcc-data/.env
    environment:
      - NODE_ENV=production
      - SC_DB_PATH=/data/squirrelchat/squirrelchat.db
      - SC_PORT=8790
    ports:
      - "${SC_PORT:-8790}:8790"
    volumes:
      - ./squirrelchat-data:/data/squirrelchat
      - ./logs:/data/logs
    depends_on:
      rcc-api:
        condition: service_healthy
    networks:
      - rcc-net

  # ── Dashboard (WASM static) ───────────────────────────────────────────────
  # Serves the pre-built Leptos/WASM frontend. Proxies /api to rcc-api.
  dashboard:
    image: nginx:alpine
    container_name: rcc-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8788}:80"
    volumes:
      - ./rcc/dashboard/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rcc-api
    networks:
      - rcc-net

networks:
  rcc-net:
    driver: bridge

volumes:
  rcc-data:
  squirrelchat-data:
  logs:

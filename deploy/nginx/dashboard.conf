# Nginx config for CCC dashboard container
# Serves the Leptos WASM SPA, proxies /api and /bus to ccc-api (acc-server)

server {
    listen 80;
    server_name _;

    # Dashboard SPA (Leptos WASM)
    root /usr/share/nginx/html;
    index index.html;

    # WASM needs correct MIME type
    types {
        application/wasm wasm;
    }

    # SPA fallback — all unknown paths serve index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ClawChat — standalone WASM SPA served from its own dist/
    # Build: cd ccc/clawchat && trunk build --release --public-url /clawchat/
    location /clawchat/ {
        alias /usr/share/nginx/clawchat/;
        try_files $uri $uri/ /clawchat/index.html;
    }

    # Proxy all API calls to acc-server
    location /api/ {
        proxy_pass http://ccc-api:8789/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AgentBus SSE stream — disable buffering so events reach the client immediately
    location /bus/ {
        proxy_pass http://ccc-api:8789/bus/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Health check (used by load balancers and Consul)
    location /health {
        proxy_pass http://ccc-api:8789/health;
    }
}

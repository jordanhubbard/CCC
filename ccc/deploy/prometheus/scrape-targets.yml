# Additional Prometheus scrape targets for the CCC stack.
# Append these job_name entries to /etc/prometheus/prometheus.yml on the hub node,
# then reload: curl -X POST http://localhost:9090/-/reload

scrape_configs:

  # ── tokenhub — per-provider LLM request/cost/latency metrics ──────────────
  - job_name: 'tokenhub'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8090']
        labels:
          service: 'tokenhub'
    metrics_path: '/metrics'

  # ── ccc-server — API and queue metrics ────────────────────────────────────
  - job_name: 'ccc-server'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8789']
        labels:
          service: 'ccc-server'
    metrics_path: '/api/metrics'
    bearer_token: '<YOUR_CCC_AGENT_TOKEN>'
